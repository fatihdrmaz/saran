    const done = R('div',{className:'page'},

      {h:'Hangi verileri topluyoruz?'},

      {h:'Ödeme ve iptal'},

      {h:'Sorumluluk'},

    return Object.assign({ home, blog, eval: evalPage, done, kvkk, terms,
      'article-diyabet': article('article-diyabet'), 'article-basi': article('article-basi'),
      'article-pansuman': article('article-pansuman'), 'article-beslenme': article('article-beslenme') });
  }

    const paths = { home:'', blog:'/blog', 'article-diyabet':'/blog/diyabetik-ayak-bakimi', 'article-basi':'/blog/basi-yarasi-onleme', 'article-pansuman':'/blog/evde-pansuman', 'article-beslenme':'/blog/yara-beslenme', kvkk:'/kvkk', terms:'/kullanim-kosullari', eval:'/degerlendirme', done:'/degerlendirme/tamam' };
